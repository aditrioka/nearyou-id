ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ id.nearyou.app.ApplicationKt.module ]
    }
    environment = "production"
    environment = ${?KTOR_ENV}
}

db {
    url = ${?DB_URL}
    user = ${?DB_USER}
    password = ${?DB_PASSWORD}
    maxPoolSize = 20
}

auth {
    rsaPrivateKey = ${?KTOR_RSA_PRIVATE_KEY}
    supabaseJwtSecret = ${?SUPABASE_JWT_SECRET}
    supabaseUrl = ${?SUPABASE_URL}
    google {
        audiences = ${?GOOGLE_CLIENT_IDS}
    }
    apple {
        audiences = ${?APPLE_BUNDLE_IDS}
    }
}
