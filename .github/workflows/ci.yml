name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew ktlintCheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assemble

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      # Exclude network-tagged tests (upstream JWKS flakes) and database-tagged tests
      # (require a running Postgres; CI has no compose stack yet — see follow-up
      # issue to add a postgres service container so DB tests can run in PR CI).
      # Kotest 5.x tag expression grammar uses `&` (AND), `|` (OR), `!` (NOT) —
      # comma is NOT a valid separator and causes the whole expression to fall
      # back to "no filter", which makes every database-tagged test run against
      # a nonexistent Postgres and explode with ConnectException.
      - run: ./gradlew test -Dkotest.tags='!network & !database'
