name: CI

on:
  pull_request:
    branches:
      - main
    # Workflow-level `paths-ignore` evaluates the CUMULATIVE PR diff (head vs
    # base merge-base), so a PR that has any code-touching commit anywhere in
    # its history will still trigger CI on every push — including pure
    # docs-tick pushes. The `changes` job below adds a PER-PUSH filter that
    # gates the heavy jobs when the new commits only touch docs.
    #
    # This list still serves the all-docs-only-PR case (e.g. an OpenSpec
    # proposal PR before any feat work lands): when EVERY path in the
    # cumulative diff matches, the workflow doesn't fire at all — saving
    # the ~15s `changes` job overhead too.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
      - 'LICENSE'

# Cancel superseded runs: when a new push lands on the same PR/branch, any
# in-flight run for a prior commit is aborted to free up runners and avoid
# stale check results blocking the PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Per-push docs-only filter. Computes the diff between the previous head
  # (`github.event.before`) and the new head (`github.event.pull_request.head.sha`)
  # and emits `code=true` when any non-docs path changed. Heavy jobs below
  # gate on this output so docs-tick pushes mid-PR (e.g. `tasks.md` checkbox
  # ticks during /opsx:apply) skip the ~7 min test lane.
  #
  # Falls back to the cumulative PR diff when `before` is the zero-SHA
  # (first push to a freshly-opened PR) — the heavy lane runs at least once
  # for any code-touching PR.
  #
  # NOTE: this is a hand-rolled `git diff + grep` filter. If we ever need
  # MULTIPLE filter axes (e.g. "skip android tests when only backend changed"
  # / "skip backend tests when only mobile changed"), switch to
  # `dorny/paths-filter@v3` — battle-tested third-party action with
  # declarative YAML filter rules. See `FOLLOW_UPS.md` entry
  # `ci-paths-filter-switch-to-dorny` for the trigger conditions and
  # migration sketch.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        run: |
          set -euo pipefail
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.event.pull_request.head.sha }}'
          ZERO_SHA='0000000000000000000000000000000000000000'
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO_SHA" ]; then
            BEFORE='${{ github.event.pull_request.base.sha }}'
            echo "First push or zero-sha BEFORE → falling back to PR base $BEFORE"
          fi
          echo "Diff range: $BEFORE..$AFTER"
          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" || true)
          echo "Changed files:"
          echo "$CHANGED"
          # Code = anything NOT in the docs-only allowlist below.
          # Mirror the workflow-level paths-ignore so the two stay in sync.
          CODE=$(echo "$CHANGED" | grep -vE '^(docs/|.*\.md$|\.gitignore$|LICENSE$)' || true)
          if [ -n "$CODE" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "→ Code paths changed; running heavy jobs."
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "→ Only docs paths changed; skipping heavy jobs."
          fi

  # `readme-sync` is a fast warning-only check (no Java / Gradle setup required).
  # Verifies that the auto-generated module-list block in `README.md` is still in
  # sync with `settings.gradle.kts` + `dev/module-descriptions.txt`. Warning-only
  # by design — solo-dev velocity beats hard-fail on documentation drift; the
  # signal stays visible via the GH Actions warning annotation.
  #
  # If you added a new module and this fails: run
  #   `dev/scripts/sync-readme.sh --write`
  # locally and commit the README diff. If you added a module without a
  # description, the script tells you exactly which line to add to
  # `dev/module-descriptions.txt`.
  readme-sync:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check README modules block in sync
        run: |
          if ! ./dev/scripts/sync-readme.sh --check; then
            echo "::warning file=README.md::README modules block is out of sync — run dev/scripts/sync-readme.sh --write"
            exit 0
          fi

  # `lint` runs both linters in one job: ktlintCheck + detekt. Previously detekt
  # was missing from CI even though CLAUDE.md claimed both ran — PRs #31 / #32
  # hit detekt failures locally that CI didn't catch.
  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew ktlintCheck detekt

  # NOTE: a standalone `build: ./gradlew assemble` job used to live here. It was
  # redundant with `test` (which compiles all main code as a prerequisite to
  # running tests) — dropping it saves a full runner per PR with zero loss of
  # signal. If `test` ever needs splitting, re-add a focused compile-only gate
  # rather than reviving full assemble.
  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Service containers — mirror `dev/docker-compose.yml` exactly so the defaults
    # that integration tests resolve to in local dev also work on GHA runners:
    #   - Postgres+PostGIS: required by V4's geography columns on `posts`
    #     (ST_MakePoint, ST_SetSRID, ST_Distance).
    #   - Redis: required by `:infra:redis` `RedisRateLimiterIntegrationTest`
    #     (sliding-window Lua script + ZPOPMAX). Standalone mode; cluster
    #     `CROSSSLOT` behavior is exercised only in staging/prod via real Upstash.
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nearyou_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nearyou_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      # Network-tagged tests (upstream JWKS flakes) still excluded. Database-tagged
      # tests NOW run against the service-container Postgres + Redis above.
      # Kotest 5.x tag expression grammar uses `&` (AND), `|` (OR), `!` (NOT) —
      # comma is NOT a valid separator.
      - run: ./gradlew test -Dkotest.tags='!network'
        env:
          DB_URL: jdbc:postgresql://localhost:5433/nearyou_dev
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_URL: redis://localhost:6379

  # Runs Flyway against a Postgres instance configured to mirror a fresh
  # Supabase project — PostGIS installed-but-not-enabled, realtime/auth
  # schemas pre-seeded. Catches migrations that rely on environment state
  # they don't explicitly establish (the class of bug that broke the first
  # two staging deploys: V4 forgot `CREATE EXTENSION postgis`, V2's realtime
  # guard skipped on plain Postgres and hid a reference to a missing table).
  # See `dev/supabase-parity-init.sql` for the simulated starting state.
  migrate-supabase-parity:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: parity
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d parity"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Apply Supabase-parity starting state
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -p 5434 -U postgres -d parity \
            -v ON_ERROR_STOP=1 \
            -f dev/supabase-parity-init.sql
      - name: Run Flyway migrate
        run: |
          docker run --rm --network=host \
            -v "$PWD/backend/ktor/src/main/resources/db/migration:/flyway/sql:ro" \
            flyway/flyway:10 \
            -url=jdbc:postgresql://localhost:5434/parity \
            -user=postgres -password=postgres \
            -locations=filesystem:/flyway/sql \
            migrate
