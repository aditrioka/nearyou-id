name: Deploy staging

# Auto-deploy on every push to main. `workflow_dispatch` also exposed for manual
# re-deploys (e.g. rolling back by redeploying an earlier commit).
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  GAR_REPO: nearyou-backend
  SERVICE: nearyou-backend-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Reserved for future Workload Identity Federation migration.
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      # buildx + GHA cache: the Dockerfile already declares BuildKit cache mounts
      # for `/root/.gradle` and `/workspace/.gradle`, but those caches don't
      # survive between ephemeral GHA runners with the default builder. Switching
      # to buildx with `cache-from/to type=gha` persists the Gradle dep cache and
      # most builder layers across deploys. Empirically cuts Docker build time
      # from ~5 min cold to ~1-2 min warm on incremental code changes.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${GAR_REPO}/${SERVICE}:${GITHUB_SHA::12}"
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          # `mode=max` caches every intermediate layer (not just the final
          # exported one) so subsequent builds reuse Gradle dep resolution +
          # subproject compile output. The cache is scoped per-branch by GHA
          # automatically; main-branch deploys share state across runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # max-instances=1 while RUN_FLYWAY_ON_STARTUP=true — prevents racing on the
      # flyway_schema_history_lock during scale-out. Lift this cap once migrations
      # move to a dedicated Cloud Run Job (planned for the prod split).
      #
      # Cloud Run probes (per the health-check-endpoints capability):
      #  - Startup probe → /health/ready (gates traffic during boot; the K8s
      #    "readiness" analog — Cloud Run does not have a separate readiness probe).
      #  - Liveness probe → /health/live (continuous keepalive after startup).
      # Probe traffic carries `User-Agent: GoogleHC/...` and bypasses the
      # /health/* per-IP rate limit (HealthRoutes.kt detects the regex
      # `^(GoogleHC|kube-probe)/`).
      #
      # SUPABASE_URL is sourced from the GCP Secret Manager `staging-supabase-url`
      # slot, consistent with every other staging value in this app. Although the
      # URL itself isn't cryptographically secret (it's embedded in mobile apps
      # anyway), Secret Manager is the centralized env-var store for staging —
      # single source of truth, audit trail via Cloud Audit Logs, prod cutover
      # establishes the same `prod-supabase-url` pattern.
      #
      # INTERNAL_OIDC_AUDIENCE is the deployed Cloud Run service URL —
      # `https://api-staging.nearyou.id` for staging. Bound via plain
      # `--set-env-vars=` rather than `--set-secrets=`: the audience is a public
      # service URL (Cloud Scheduler also passes it as `--oidc-token-audience`
      # in the clear), NOT secret material. Routing it through Secret Manager
      # would muddle the project's `secretKey()` helper contract per
      # `openspec/specs/internal-endpoint-auth/spec.md`. Validated at boot by
      # `Application.module()`'s `resolveInternalOidcAudience` — missing /
      # blank / non-URL fails-fast before the HTTP server starts so the new
      # revision's startup probe rejects.
      # `--no-cpu-throttling` (iter 15, issue #88 root-cause fix) —
      # By default Cloud Run only allocates CPU during request handling and
      # throttles to ~5% CPU between requests. Our Layer 3 dispatch is
      # fire-and-forget AFTER the 201 response is sent, so the dispatch
      # coroutine runs on a throttled CPU. Empirical evidence (iter 14 staging
      # heartbeat data, 2026-05-12): identical Redis-cache `isEnabled()` calls
      # take 5-16ms when triggered DURING a user request, but 2800-7400ms when
      # triggered on a background timer. Same code, same Redis, same network —
      # 1000x slower because of CPU throttling. All 14 prior iterations chased
      # other hypotheses (engines, dispatcher leak, connection pool, etc.); this
      # is the actual root cause documented in Cloud Run docs:
      # https://cloud.google.com/blog/products/serverless/cloud-run-gets-always-on-cpu-allocation
      #
      # `--no-cpu-throttling` switches to instance-based CPU allocation: CPU is
      # available for the entire instance lifecycle including post-response
      # background work. Cost: ~20-30% more for the staging instance (we pay
      # for idle CPU too), but it's the architecturally-correct config for
      # any Cloud Run service doing fire-and-forget async work. Required for
      # production too — any service using Layer 3 needs this flag.
      #
      # Other flags preserved from prior iterations:
      #   --cpu=2 (PR #90)             — JVM headroom for moderation dispatch
      #   --min-instances=1 (PR #91)   — eliminate cold-start of Layer 3 path
      #   --max-instances=1            — Flyway lock safety (existing constraint)
      #   --concurrency=80             — production-shaped (reverted from PR #89 in PR #90)
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image="${IMAGE}" \
            --region="${{ secrets.GCP_REGION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=1 \
            --memory=512Mi \
            --cpu=2 \
            --no-cpu-throttling \
            --concurrency=80 \
            --timeout=60 \
            --set-env-vars="KTOR_ENV=staging,RUN_FLYWAY_ON_STARTUP=true,INTERNAL_OIDC_AUDIENCE=https://api-staging.nearyou.id" \
            --set-secrets="DB_URL=staging-db-url:latest,DB_USER=staging-db-user:latest,DB_PASSWORD=staging-db-password:latest,KTOR_RSA_PRIVATE_KEY=staging-ktor-rsa-private-key:latest,JITTER_SECRET=staging-jitter-secret:latest,INVITE_CODE_SECRET=staging-invite-code-secret:latest,SUPABASE_JWT_SECRET=staging-supabase-jwt-secret:latest,SUPABASE_SERVICE_ROLE_KEY=staging-supabase-service-role-key:latest,SUPABASE_URL=staging-supabase-url:latest,REDIS_URL=staging-redis-url:latest,FIREBASE_ADMIN_SA=staging-firebase-admin-sa:latest,OPENAI_API_KEY=staging-openai-api-key:latest,OTEL_GRAFANA_OTLP_ENDPOINT=staging-otel-grafana-otlp-endpoint:latest,OTEL_GRAFANA_OTLP_TOKEN=staging-otel-grafana-otlp-token:latest" \
            --startup-probe="httpGet.path=/health/ready,initialDelaySeconds=5,periodSeconds=10,timeoutSeconds=3,failureThreshold=3" \
            --liveness-probe="httpGet.path=/health/live,initialDelaySeconds=30,periodSeconds=30,timeoutSeconds=2,failureThreshold=3" \
            --quiet

      - name: Show service URL
        run: |
          URL=$(gcloud run services describe "${SERVICE}" \
            --region="${{ secrets.GCP_REGION }}" \
            --format='value(status.url)')
          echo "Service deployed: ${URL}"
          echo "## Staging deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${IMAGE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${URL}" >> $GITHUB_STEP_SUMMARY
